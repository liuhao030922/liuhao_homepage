<nav class="navbar navbar-expand-lg fixed-top mb-5 navbar-site">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %} navbar-site-inner">
        <a class="navbar-brand" href="{{ '/' | relative_url }}">
            <span class="navbar-brand-label navbar-brand-terminal">
                {{ site.data.profile.primary_name | default: site.data.profile.navbar_name }}
            </span>
        </a>
        <button class="navbar-toggler navbar-site-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
            <i class="fas fa-bars"></i>
        </button>

        <div class="collapse navbar-collapse justify-content-end" id="navbarResponsive">
            <ul class="navbar-nav navbar-site-nav">
                {% for item in site.data.navigation.pages %}
                <li class="nav-item {% if item.name == page.navbar_title %}active{% endif %}">
                    <a class="nav-link" href="{{ item.url | relative_url }}">{{ item.name }}</a>
                </li>
                {% endfor %}
            </ul>
        </div>
    </div>
</nav>
